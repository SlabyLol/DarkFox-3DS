name: Build DarkFox-3DS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkitarm:latest
      env:
        DEVKITPRO: /opt/devkitpro
        DEVKITARM: /opt/devkitpro/devkitARM

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: PATH setzen
        run: |
          echo "PATH=$DEVKITPRO/tools/bin:$DEVKITARM/bin:$PATH" >> $GITHUB_ENV

      - name: Diagnose (vor Installation)
        run: |
          echo "=== 3dsx_crt0.o suchen ==="
          find /opt/devkitpro -name "3dsx_crt0.o" 2>/dev/null || echo "NICHT GEFUNDEN"
          echo "=== Installierte 3DS-Pakete ==="
          dkp-pacman -Q 2>/dev/null | grep -iE "3ds|ctru" || echo "Keine 3DS-Pakete"
          echo "=== libctru/lib ==="
          ls /opt/devkitpro/libctru/lib/ 2>/dev/null || echo "Verzeichnis fehlt"

      - name: 3DS-Dev-Tools installieren
        run: |
          # Paketdatenbank aktualisieren, dann 3ds-dev installieren
          dkp-pacman -Sy --noconfirm
          dkp-pacman -S --noconfirm 3ds-dev

          # Harter Verifikations-Check - bricht den Build ab wenn crt0 fehlt
          echo "=== Verifikation ==="
          find /opt/devkitpro -name "3dsx_crt0.o" | grep . \
            || { echo "FEHLER: 3dsx_crt0.o nach Installation nicht gefunden!"; exit 1; }

      - name: Build project
        run: |
          make

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DarkFox-3DS-build
          path: |
            *.3dsx
            *.smdh
