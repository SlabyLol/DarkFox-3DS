name: Build DarkFox-3DS
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkitarm:latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          # Falls der Server 403 wirft, versuchen wir es ohne -Syu.
          # Die wichtigsten 3DS-Tools sind im Container meist schon vorhanden.
          sudo dkp-pacman -S --noconfirm 3ds-dev || echo "Pacman failed, attempting build with pre-installed tools..."

      - name: Build project
        run: |
          make

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DarkFox-3DS-build
          path: |
            *.3dsx
            *.smdh
