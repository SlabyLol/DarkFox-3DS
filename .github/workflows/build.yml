name: Build DarkFox-3DS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkitarm:20240202
      env:
        DEVKITPRO: /opt/devkitpro
        DEVKITARM: /opt/devkitpro/devkitARM

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: PATH setzen
        run: |
          echo "PATH=$DEVKITPRO/tools/bin:$DEVKITARM/bin:$PATH" >> $GITHUB_ENV

      - name: Verifikation
        run: |
          echo "=== 3dsx_crt0.o ==="
          find /opt/devkitpro -name "3dsx_crt0.o" 2>/dev/null \
            || { echo "FEHLER: 3dsx_crt0.o nicht gefunden!"; exit 1; }
          echo "=== arm-none-eabi-g++ ==="
          arm-none-eabi-g++ --version

      - name: Build project
        run: make

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DarkFox-3DS-build
          path: |
            *.3dsx
            *.smdh
